openapi: 3.0.0
info:
  title: ICE Nomba Hackathon API
  version: 1.0.0
  description: OpenAPI Specification for merged ICE endpoints (Merchants, Vendors, Invoices, Webhooks)
servers:
  - url: https://ice-nomba-hackathon.onrender.com/v1
    description: Production (Render)
  - url: http://localhost:3000/v1
    description: Local Development Server
tags:
  - name: Health
    description: Basic liveness check for the deployed service. No auth required.
  - name: Merchants
    description: Top-level platform owner account. The master key is required for anything merchant-scoped.
  - name: Vendors
    description: Sub-accounts under a merchant, each with their own Nomba Dedicated Virtual Account (DVA).
  - name: Customers
    description: End customers of a vendor, optionally provisioned with their own DVA. Nested under /vendors/{id}/customers.
  - name: Invoices
    description: Core billing objects, created in draft, issued to generate a payment reference, then reconciled against inbound Nomba webhooks or manually overridden.
  - name: Misdirected Payments
    description: Payments that arrive via webhook but can't be matched to any invoice or customer DVA.
  - name: Webhook Deliveries
    description: Outbound webhooks ICE sends to a merchant's own webhookUrl.
  - name: Statements & Reporting
    description: Read-only rollups for vendors, customers, and the platform owner.
  - name: Webhooks (Nomba Inbound)
    description: Simulates Nomba sending ICE a webhook (payment_success events, DVA inbound transfers).
components:
  securitySchemes:
    ApiKeyAuth:
      type: http
      scheme: bearer
      description: API Key retrieved from merchant registration.
  schemas:
    RegisterMerchantInput:
      type: object
      required:
        - businessName
        - email
        - webhookUrl
      properties:
        businessName:
          type: string
          example: "StyleHub Marketplace"
        email:
          type: string
          format: email
          example: "operations@stylehub.com"
        webhookUrl:
          type: string
          format: uri
          example: "https://stylehub.com/api/webhooks/nomba"
    UpdateWebhookInput:
      type: object
      required:
        - webhookUrl
      properties:
        webhookUrl:
          type: string
          format: uri
          example: "https://stylehub.com/api/webhooks/nomba-v2"
    CreateVendorInput:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: "Acme Vendor"
    UpdateVendorAccountInput:
      type: object
      description: >
        Both fields optional individually. Requires master_api_key even though
        this is a vendor-scoped resource — the controller checks
        req.principal.tier !== 'merchant' and 403s vendor keys here.
      properties:
        name:
          type: string
          example: "Adunola Fabrics Ltd"
        callbackUrl:
          type: string
          format: uri
          example: "https://example.com/callbacks/adunola"
          description: Must start with https://
    CreateInvoiceInput:
      type: object
      required:
        - vendor_id
        - customer_id
        - amount_kobo
      properties:
        vendor_id:
          type: string
          format: uuid
        customer_id:
          type: string
          format: uuid
        amount_kobo:
          type: integer
          example: 50000
    NombaWebhookPayload:
      type: object
      description: >
        Real Nomba webhook payload shape (event_type/requestId/data.merchant/data.transaction),
        confirmed against Nomba's Webhooks Introduction docs and this project's HMAC-SHA256
        signature verification implementation. The signed string is built as
        event_type:requestId:merchant.userId:merchant.walletId:transaction.transactionId:
        transaction.type:transaction.time:transaction.responseCode:nomba-timestamp, then
        base64-encoded. Only fields required for signature verification and reconciliation
        are marked required; Nomba may send additional fields not listed here.
      required:
        - event_type
        - requestId
        - data
      properties:
        event_type:
          type: string
          enum: [payment_success, payment_failed, payment_reversal]
        requestId:
          type: string
          format: uuid
        data:
          type: object
          required:
            - merchant
            - transaction
          properties:
            merchant:
              type: object
              required:
                - userId
                - walletId
              properties:
                userId:
                  type: string
                walletId:
                  type: string
                walletBalance:
                  type: number
            terminal:
              type: object
              properties:
                terminalId:
                  type: string
                terminalLabel:
                  type: string
            transaction:
              type: object
              required:
                - transactionId
                - type
                - time
              properties:
                transactionId:
                  type: string
                type:
                  type: string
                  example: vact_transfer
                time:
                  type: string
                  format: date-time
                responseCode:
                  type: string
                transactionAmount:
                  type: number
                fee:
                  type: number
                aliasAccountNumber:
                  type: string
                aliasAccountName:
                  type: string
                aliasAccountType:
                  type: string
                sessionId:
                  type: string
            customer:
              type: object
              properties:
                senderName:
                  type: string
                accountNumber:
                  type: string
                bankName:
                  type: string
                bankCode:
                  type: string
    CreateCustomerInput:
      type: object
      required:
        - name
        - email
      properties:
        name:
          type: string
          example: "Jane Doe"
        email:
          type: string
          format: email
          example: "jane@example.com"
        provisionDva:
          type: boolean
          default: false
    MatchPaymentInput:
      type: object
      required:
        - invoiceId
      properties:
        invoiceId:
          type: string
          format: uuid

paths:
  /healthz:
    servers:
      - url: https://ice-nomba-hackathon.onrender.com
        description: Production (Render) - root, outside the /v1 router
      - url: http://localhost:3000
        description: Local Development Server - root, outside the /v1 router
    get:
      tags: [Health]
      summary: Liveness check
      description: Basic liveness check for the deployed service. No auth required. Mounted at the app root, outside the /v1 router - not under the /v1 prefix like every other path in this spec.
      security: []
      responses:
        '200':
          description: Service is up

  /merchants/register:
    post:
      tags: [Merchants]
      summary: Register a new platform merchant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterMerchantInput'
      responses:
        '201':
          description: Merchant created successfully
  /merchants/{id}:
    get:
      tags: [Merchants]
      summary: Get merchant profile
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Merchant details
  /merchants/{id}/webhook-url:
    put:
      tags: [Merchants]
      summary: Update webhook URL
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWebhookInput'
      responses:
        '200':
          description: Webhook URL updated
  /merchants/{id}/api-keys/rotate:
    post:
      tags: [Merchants]
      summary: Rotate API keys
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: New API key returned
  /merchants/{id}/webhook-deliveries:
    get:
      tags: [Merchants]
      summary: List outbound webhook deliveries for a merchant
      description: Outbound webhooks ICE sends to a merchant's own webhookUrl (e.g. for payment.overpayment.refunded events).
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of webhook delivery records

  /vendors:
    post:
      tags: [Vendors]
      summary: Create a new vendor (with Nomba DVA provisioning)
      description: Provisions a Nomba DVA server-side. Requires master_api_key - vendor keys get a 403 here.
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVendorInput'
      responses:
        '201':
          description: Vendor created with VA
    get:
      tags: [Vendors]
      summary: List vendors for a merchant
      security:
        - ApiKeyAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            default: 20
        - name: status
          in: query
          required: false
          description: "One of: pending, active, suspended"
          schema:
            type: string
            enum: [pending, active, suspended]
      responses:
        '200':
          description: Paginated list of vendors
  /vendors/{id}:
    get:
      tags: [Vendors]
      summary: Get vendor profile
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Vendor details
  /vendors/{id}/api-keys:
    post:
      tags: [Vendors]
      summary: Generate a scoped vendor API key
      description: Requires master_api_key (only merchants can generate vendor keys). Returns the scoped vendor key once.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: New vendor API key returned (shown once)
  /vendors/{id}/account/suspend:
    post:
      tags: [Vendors]
      summary: Suspend a vendor account
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Vendor account suspended
  /vendors/{id}/account:
    put:
      tags: [Vendors]
      summary: Update a vendor account
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateVendorAccountInput'
      responses:
        '200':
          description: Vendor account updated

  /vendors/{id}/customers:
    post:
      tags: [Customers]
      summary: Create a customer under a vendor
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCustomerInput'
      responses:
        '201':
          description: Customer created
  /vendors/{id}/customers/{cid}:
    get:
      tags: [Customers]
      summary: Get a customer by ID
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: cid
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Customer details
  /vendors/{id}/customers/{cid}/account:
    post:
      tags: [Customers]
      summary: Provision a dedicated virtual account (DVA) for a customer
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: cid
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Customer with provisioned virtual account

  /invoices:
    post:
      tags: [Invoices]
      summary: Create an invoice
      description: Requires a vendor-tier API key.
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInvoiceInput'
      responses:
        '201':
          description: Invoice created
  /invoices/{id}:
    get:
      tags: [Invoices]
      summary: Get an invoice
      description: Requires a vendor-tier API key.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Invoice details
  /invoices/vendor/{vendorId}:
    get:
      tags: [Invoices]
      summary: List invoices by vendor
      description: Requires a vendor-tier API key.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: vendorId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of invoices
  /invoices/{id}/issue:
    patch:
      tags: [Invoices]
      summary: Issue a draft invoice
      description: Requires a vendor-tier API key.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Invoice issued
  /invoices/{id}/mark-paid:
    post:
      tags: [Invoices]
      summary: Manually mark an invoice as paid
      description: Requires a master-tier (merchant) API key - platform-owner-only, audit-logged.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Invoice marked paid
  /invoices/{id}/reconciliation:
    get:
      tags: [Invoices]
      summary: Get reconciliation status for a single invoice
      description: Requires a vendor-tier API key.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Reconciliation status for this invoice
  /invoices/reconciliation/logs:
    get:
      tags: [Invoices]
      summary: Get reconciliation logs across all invoices (master key only)
      description: Distinct from GET /invoices/{id}/reconciliation - this is the platform-wide log, not a single invoice's status.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated reconciliation log entries

  /payments/misdirected:
    get:
      tags: [Misdirected Payments]
      summary: List misdirected payments (merchant tier only)
      security:
        - ApiKeyAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: Paginated list of misdirected payments
  /payments/{id}/match:
    post:
      tags: [Misdirected Payments]
      summary: Match a misdirected payment to an invoice
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MatchPaymentInput'
      responses:
        '200':
          description: Payment matched to invoice
  /payments/{id}/refund:
    post:
      tags: [Misdirected Payments]
      summary: Refund a misdirected payment
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Payment refunded

  /webhook-deliveries/{id}/replay:
    post:
      tags: [Webhook Deliveries]
      summary: Manually replay a webhook delivery
      description: >-
        NOTE: current implementation reads `id` from the JSON request body,
        not the URL path parameter, despite the route pattern. Send the
        delivery ID in the body as shown below.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - id
              properties:
                id:
                  type: string
      responses:
        '200':
          description: Replay initiated
        '404':
          description: Webhook delivery record not found

  /vendors/{id}/statement:
    get:
      tags: [Statements & Reporting]
      summary: Get a vendor's statement
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 50
        - name: from
          in: query
          schema:
            type: string
        - name: to
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Vendor statement
  /vendors/{id}/customers/{cid}/statement:
    get:
      tags: [Statements & Reporting]
      summary: Get a customer's statement under a vendor
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: cid
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 50
        - name: from
          in: query
          schema:
            type: string
        - name: to
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Customer statement
  /vendors/{id}/transactions:
    get:
      tags: [Statements & Reporting]
      summary: List transactions for a vendor
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: List of transactions
  /merchants/{id}/summary:
    get:
      tags: [Statements & Reporting]
      summary: Get platform summary for a merchant (master key only)
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Platform summary
  /transactions/{id}:
    get:
      tags: [Statements & Reporting]
      summary: Get a transaction by ID
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Transaction details
        '404':
          description: Transaction not found

  /webhooks/nomba:
    post:
      tags: [Webhooks (Nomba Inbound)]
      summary: Receive Nomba Webhooks
      parameters:
        - name: nomba-signature
          in: header
          required: true
          description: Base64-encoded HMAC-SHA256 signature of the signed string described in NombaWebhookPayload.
          schema:
            type: string
        - name: nomba-timestamp
          in: header
          required: true
          description: RFC-3339 UTC timestamp; must match the timestamp used when computing nomba-signature.
          schema:
            type: string
            format: date-time
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NombaWebhookPayload'
      responses:
        '200':
          description: Webhook acknowledged
