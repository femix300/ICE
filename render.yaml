services:
  - type: web
    name: ice-api
    runtime: node
    region: oregon
    plan: starter
    branch: dev
    buildCommand: npm install && npm run migrate
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: ice-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: ice-redis
          property: connectionString
      - key: NOMBA_CLIENT_ID
        sync: false
      - key: NOMBA_CLIENT_SECRET
        sync: false
      - key: NOMBA_ACCOUNT_ID
        sync: false
      - key: NOMBA_WEBHOOK_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false

databases:
  - name: ice-db
    region: oregon
    plan: starter
    databaseName: ice
    user: ice_user

  - name: ice-redis
    type: redis
    region: oregon
    plan: starter
    maxmemoryPolicy: noeviction
