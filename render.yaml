services:
  - type: web
    name: ice-api
    runtime: node
    plan: starter
    region: oregon
    branch: main
    autoDeploy: true
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: CORS_ORIGIN
        sync: false
      - key: NOMBA_CLIENT_ID
        sync: false
      - key: NOMBA_CLIENT_SECRET
        sync: false
      - key: NOMBA_ACCOUNT_ID
        sync: false
      - key: NOMBA_WEBHOOK_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: ice-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: ice-redis
          property: connectionString

  - type: redis
    name: ice-redis
    plan: starter
    region: oregon
    ipAllowList: []

databases:
  - name: ice-postgres
    plan: starter
    region: oregon
    databaseName: ice
    user: ice
